<!DOCTYPE html>
<html>
    <head>
        <title>
            Enquiry Form
        </title>
        <style>
            body {
            font-family: Arial, sans-serif;
            background-color: #999999;
            color: white;
            }

            header {
            background-color: #ff8c00;
            padding: 20px;
            text-align: center;
            color: black;
            font-size: 28px;
            font-weight: bold;
            }

            .form-container {
            width: 400px;
            margin: 40px auto;
            padding: 25px;
            background-color: #999999;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(255, 165, 0, 0.3);
            }
            
            label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
            }

            input[type="text"], select, textarea {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 5px;
            outline: none;
            }

            textarea {
            resize: none;
            }
            
            input[type="submit"], input[type="reset"] {
            width: 48%;
            padding: 10px;
            margin-top: 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            }

            input[type="submit"] {
            background-color: orange;
            color: black;
            }

            input[type="reset"] {
            background-color: #444;
            color: white;
            }

            input[type="submit"]:hover {
            background-color: #ffb84d;
            }

            input[type="reset"]:hover {
            background-color: #666;
            }
    </style>

    </head>

    <body>

    <header>
        Enquiry Form
    </header>

    <div class="form-container">
        <h3>
            Fill in the form to enquire more about ERP systems
        </h3>

        <form action="mailto:4655409@myuwc.ac.za?Subject=User Input sent through" method="post"
            enctype="text/plain">
            <label for="firstname">
            First Name
            </label> <br>
            <input type="text" name="firstname" size="35" maxlength="35"/> 
            <br>
            <label for="surname">
            Surname 
            </label> <br>
            <input type="text" name="surname" size="35" maxlength="35"/>
            <br>
            <label for="webpage">
                Subject of Enquiry
            </label> <br>
            <select name="Subject" style="width: 275px;">
                <option>Challenge: Money and Resources</option>
                <option>Challenge: Data Migration</option>
                <option>Challenge: Resistance and Lack of Training</option>
                <option>Solution: Money and Resources</option>
                <option>Solution: Data Migration</option>
                <option>Solution: Resistance and Lack of Training</option>         
            </select> <br>
            <br>
            <label for="enquiry">
                What would you like to enquire about?
            </label> <br>
            <textarea name="enquiry" rows="3" cols="35">
            </textarea><br>
            <br>
            <div style="display:flex; justify-content: space-between;">
                <input type="submit" value="Submit">&nbsp;
                <input type="reset" value="Clear">
            </div>          
            <p>
                Return to <a href="https://sites.google.com/d/10UurYeGmxhjSYm7lNCVEKKsISTU74F7e/p/19iaghJhq0sRxVIqI2ImbILpXw4z6sRYS/edit" target="_self">
                    Feedback
                </a>
            </p>
        </form>
    </div>
</body> 

</html>
